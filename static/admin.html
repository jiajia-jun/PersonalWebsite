<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 个人主页</title>
    <link rel="stylesheet" href="/static/css/docsy-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --text: #1a1a2e;
            --text-secondary: #666;
            --bg: #f0f2f5;
            --card-bg: #fff;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
        }

        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .back-home {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 0.9rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }

        .back-home:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        .admin-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .admin-container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }

        .admin-editor-container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
        }

        /* 卡片 */
        .admin-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
            border: 1px solid var(--border);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            padding: 2.5rem 2.5rem 1.25rem;
            text-align: center;
        }

        .card-header .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-bottom: 1rem;
            box-shadow: 0 4px 14px rgba(102,126,234,0.3);
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.35rem;
        }

        .card-header .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 表单 */
        .login-form {
            padding: 0.5rem 2.5rem 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .form-group label svg {
            width: 18px;
            height: 18px;
            color: #999;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 0.9rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            background: #f9fafb;
            color: var(--text);
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.08);
        }

        .password-input {
            position: relative;
        }

        .password-input input {
            padding-right: 44px;
        }

        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            border-radius: 6px;
            color: #999;
        }

        .toggle-password:hover {
            background: #f3f4f6;
            color: #555;
        }

        .submit-btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.35);
        }

        .submit-btn:active { transform: translateY(0); }

        .message {
            text-align: center;
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            display: block;
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.error {
            display: block;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .card-footer {
            padding: 1.25rem 2.5rem 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
            background: #fafafa;
        }

        .toggle-password-panel {
            color: var(--primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .toggle-password-panel:hover { text-decoration: underline; }

        .password-panel {
            margin-top: 0.75rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .password-panel h4 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text);
        }

        .password-panel input {
            display: block;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        /* 编辑器视图 */
        .admin-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #fafafa;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .admin-bar-user {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-bar-user::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .editor-form {
            padding: 1.75rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-field label {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text);
        }

        .form-field input,
        .form-field textarea {
            padding: 0.65rem 0.8rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            background: #f9fafb;
            color: var(--text);
        }

        .form-field input:focus,
        .form-field textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.08);
            background: #fff;
        }

        .form-field textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .hidden { display: none !important; }

        @media (max-width: 520px) {
            .form-row { grid-template-columns: 1fr; }
            .card-header { padding: 2rem 1.5rem 1rem; }
            .login-form { padding: 0.5rem 1.5rem 1.5rem; }
            .card-footer { padding: 1rem 1.5rem 1.5rem; }
            .editor-form { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <!-- 粒子画布 -->
    <canvas id="particleCanvas"></canvas>

    <a href="/" class="back-home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回主页
    </a>

    <div class="admin-wrapper">
        <!-- 登录视图 -->
        <div class="admin-container" id="loginView">
            <div class="admin-card">
                <div class="card-header">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                        </svg>
                    </div>
                    <h1>管理员登录</h1>
                    <p class="subtitle">登录以编辑个人主页信息</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="loginUsername">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            用户名
                        </label>
                        <input type="text" id="loginUsername" name="username" placeholder="请输入管理员用户名" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            密码
                        </label>
                        <div class="password-input">
                            <input type="password" id="loginPassword" name="password" placeholder="请输入密码" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">登 录</button>
                    <div id="loginMessage" class="message"></div>
                </form>

                <div class="card-footer">
                    <span class="toggle-password-panel" id="showPasswordPanel">修改密码</span>
                    <div class="password-panel hidden" id="passwordPanel">
                        <h4>修改管理员密码</h4>
                        <input type="text" id="pwdUsername" placeholder="用户名" class="form-group input" style="margin-bottom:8px;">
                        <input type="password" id="pwdOldPassword" placeholder="旧密码" style="margin-bottom:8px;">
                        <input type="password" id="pwdNewPassword" placeholder="新密码（至少8位）">
                        <button class="docsy-btn docsy-btn-secondary" id="updatePasswordBtn" style="width:100%;margin-top:8px;">确认修改</button>
                        <div id="passwordMessage" class="message"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 编辑器视图 -->
        <div class="admin-editor-container hidden" id="editorView">
            <div class="admin-card">
                <div class="admin-bar">
                    <span class="admin-bar-user" id="adminUsername">管理员</span>
                    <button class="docsy-btn docsy-btn-danger" id="logoutBtn">退出登录</button>
                </div>

                <div class="editor-form">
                    <div id="editorMessage" class="message"></div>

                    <form id="profileForm">
                        <div class="form-row">
                            <div class="form-field">
                                <label for="eName">姓名</label>
                                <input type="text" id="eName">
                            </div>
                            <div class="form-field">
                                <label for="eTitle">头衔/职位</label>
                                <input type="text" id="eTitle">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-field">
                                <label for="eGreeting">Hero 问候语</label>
                                <input type="text" id="eGreeting" placeholder="如：你好，我是">
                            </div>
                            <div class="form-field">
                                <label for="eTagline">Hero 副标题</label>
                                <input type="text" id="eTagline" placeholder="如：欢迎来到我的个人主页">
                            </div>
                        </div>

                        <div class="form-row full">
                            <div class="form-field">
                                <label for="eBio">个人简介</label>
                                <textarea id="eBio" rows="4"></textarea>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-field">
                                <label for="eAvatar">头像 URL</label>
                                <input type="text" id="eAvatar" placeholder="https://...">
                            </div>
                            <div class="form-field">
                                <label for="eEmail">邮箱</label>
                                <input type="email" id="eEmail">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-field">
                                <label for="ePhone">电话</label>
                                <input type="text" id="ePhone">
                            </div>
                            <div class="form-field">
                                <label for="eLocation">所在地</label>
                                <input type="text" id="eLocation">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-field">
                                <label for="eGithub">GitHub URL</label>
                                <input type="text" id="eGithub">
                            </div>
                            <div class="form-field">
                                <label for="eLinkedin">LinkedIn URL</label>
                                <input type="text" id="eLinkedin">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-field">
                                <label for="eWebsite">个人网站 URL</label>
                                <input type="text" id="eWebsite">
                            </div>
                        </div>

                        <div class="form-row full">
                            <div class="form-field">
                                <label for="eSkills">技能（每行：技能名|等级数值）</label>
                                <textarea id="eSkills" rows="4" placeholder="Go|85&#10;JavaScript|80&#10;HTML/CSS|75"></textarea>
                            </div>
                        </div>

                        <div class="form-row full">
                            <div class="form-field">
                                <label for="eTimeline">经历时间线（每行：时间段|标题|描述）</label>
                                <textarea id="eTimeline" rows="4" placeholder="2024-至今|个人开发者|独立开发个人网站及开源项目&#10;2023-2024|学习阶段|系统学习 Go 语言"></textarea>
                            </div>
                        </div>

                        <div class="btn-row">
                            <button type="submit" class="docsy-btn docsy-btn-primary" style="padding:0.65rem 1.5rem;">保存修改</button>
                            <button type="button" class="docsy-btn docsy-btn-secondary" id="cancelEditBtn" style="padding:0.65rem 1.5rem;">取消</button>
                        </div>
                    </form>

                    <div class="password-panel" style="margin-top:1.5rem;">
                        <h4>修改密码</h4>
                        <div class="form-row">
                            <div class="form-field"><input type="text" id="ePwdUsername" placeholder="用户名"></div>
                            <div class="form-field"><input type="password" id="ePwdOld" placeholder="旧密码"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-field"><input type="password" id="ePwdNew" placeholder="新密码（至少8位）"></div>
                        </div>
                        <button type="button" class="docsy-btn docsy-btn-secondary" id="editorUpdatePasswordBtn">修改密码</button>
                        <div id="editorPasswordMessage" class="message"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 粒子脚本 -->
    <script>
    (function() {
        var canvas = document.getElementById('particleCanvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var particles = [];
        var COUNT = 60;
        var CONNECT = 130;
        var REPEL = 90;
        var mouse = { x: -9999, y: -9999 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        for (var i = 0; i < COUNT; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                r: Math.random() * 2 + 1
            });
        }

        document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
        document.addEventListener('mouseleave', function() { mouse.x = -9999; mouse.y = -9999; });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                p.x = Math.max(0, Math.min(canvas.width, p.x));
                p.y = Math.max(0, Math.min(canvas.height, p.y));

                var dx = p.x - mouse.x, dy = p.y - mouse.y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < REPEL && dist > 0) {
                    var f = (REPEL - dist) / REPEL;
                    p.vx += (dx/dist) * f * 1.2;
                    p.vy += (dy/dist) * f * 1.2;
                }
                p.vx *= 0.99; p.vy *= 0.99;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(130,140,170,0.3)';
                ctx.fill();
            }

            for (var i = 0; i < particles.length; i++) {
                for (var j = i+1; j < particles.length; j++) {
                    var a = particles[i], b = particles[j];
                    var dx = a.x - b.x, dy = a.y - b.y;
                    var dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < CONNECT) {
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.strokeStyle = 'rgba(150,160,190,' + ((1-dist/CONNECT)*0.18) + ')';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();
    </script>

    <script src="/static/js/admin.js?v=2"></script>
</body>
</html>
