<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="/static/docsy-styles.css">
    <link rel="stylesheet" href="/static/showcase.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="showcase-navbar" id="navbar">
        <a href="#" class="nav-brand" id="navBrand">个人主页</a>
        <div class="nav-links">
            <a href="#about" class="nav-link" data-section="about">关于我</a>
            <a href="#contact" class="nav-link" data-section="contact">联系方式</a>
            <a href="/admin" class="nav-link">管理</a>
        </div>
    </nav>

    <!-- Hero 首屏 -->
    <section class="hero-section" id="hero">
        <div class="hero-bg-shapes">
            <div class="hero-shape"></div>
            <div class="hero-shape"></div>
            <div class="hero-shape"></div>
        </div>

        <div class="hero-content">
            <div class="hero-greeting" id="heroGreeting">
                <span id="greetingText"></span><span class="typewriter-cursor"></span>
            </div>
            <h1 class="hero-name" id="heroName">你的姓名</h1>
            <p class="hero-tagline" id="heroTagline">欢迎来到我的个人主页</p>
            <div class="hero-cta">
                <a href="#about" class="hero-btn hero-btn-primary">了解更多</a>
                <a href="#contact" class="hero-btn hero-btn-outline">联系我</a>
            </div>
        </div>

        <div class="scroll-indicator" onclick="document.getElementById('about').scrollIntoView({behavior:'smooth'})">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg>
        </div>
    </section>

    <!-- 关于我 -->
    <section class="section section-hidden about-section" id="about">
        <div class="about-container">
            <div class="section-header">
                <h2 class="section-title">关于我</h2>
                <div class="section-line"></div>
            </div>

            <div class="about-grid">
                <div class="about-avatar" id="aboutAvatar">
                    <span id="avatarInitial">A</span>
                </div>
                <div class="about-text">
                    <h2 id="aboutName">你的姓名</h2>
                    <p class="about-role" id="aboutTitle">你的职位/头衔</p>
                    <p class="about-bio" id="aboutBio">在这里写一段个人简介...</p>
                    <div class="about-tags" id="aboutTags">
                        <span class="docsy-badge docsy-badge-primary">Go</span>
                        <span class="docsy-badge docsy-badge-primary">JavaScript</span>
                        <span class="docsy-badge docsy-badge-primary">Web</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系方式 -->
    <section class="section section-hidden contact-section" id="contact">
        <div class="contact-container">
            <div class="section-header">
                <h2 class="section-title">联系方式</h2>
                <div class="section-line"></div>
            </div>

            <div class="contact-grid" id="contactGrid">
                <!-- JS 动态填充 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="site-footer">
        <p id="footerText">&copy; 2026 个人主页. All rights reserved.</p>
    </footer>

    <script src="/static/home.js"></script>
</body>
</html>
