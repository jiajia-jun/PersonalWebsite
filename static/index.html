<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="/static/css/docsy-styles.css?v=10">
    <link rel="stylesheet" href="/static/css/showcase.css?v=10">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 粒子画布 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-avatar" id="sidebarAvatar">
                <span id="sidebarInitial">P</span>
            </div>
            <span class="sidebar-name" id="sidebarName">个人主页</span>
        </div>

        <nav class="sidebar-nav">
            <a class="sidebar-link active" data-page="home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>主页</span>
            </a>
            <a class="sidebar-link" data-page="gallery">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>相册</span>
            </a>
            <a class="sidebar-link" data-page="about">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                <span>关于</span>
            </a>
            <a class="sidebar-link" data-page="messages">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                <span>留言板</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/admin" class="sidebar-link sidebar-admin">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>管理</span>
            </a>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content" id="mainContent">

        <!-- ======== 主页 ======== -->
        <section class="page-section active" id="page-home">
            <div class="hero-section" id="hero">
                <div class="hero-content">
                    <div class="hero-greeting" id="heroGreeting">
                        <span id="greetingText"></span><span class="typewriter-cursor"></span>
                    </div>
                    <h1 class="hero-name" id="heroName">你的姓名</h1>
                    <p class="hero-tagline" id="heroTagline">欢迎来到我的个人主页</p>
                    <div class="hero-cta">
                        <button class="hero-btn hero-btn-primary" onclick="navigateTo('gallery')">浏览相册</button>
                        <button class="hero-btn hero-btn-outline" onclick="navigateTo('about')">了解更多</button>
                    </div>
                </div>
            </div>

            <div class="home-contact">
                <div class="section-header">
                    <h2 class="section-title">联系方式</h2>
                    <div class="section-line"></div>
                </div>
                <div class="contact-grid" id="contactGrid"></div>
            </div>
        </section>

        <!-- ======== 相册页 ======== -->
        <section class="page-section" id="page-gallery">
            <div class="page-inner">
                <div class="section-header">
                    <h2 class="section-title">相册</h2>
                    <div class="section-line"></div>
                    <p class="section-sub">不放弃我之所爱，不辜负爱我之人</p>
                </div>
                <div class="gallery-strip-wrapper" id="galleryStripWrapper">
                    <div class="gallery-strip" id="galleryStrip"></div>
                </div>
                <div class="gallery-lightbox" id="lightbox">
                    <span class="lightbox-close" id="lightboxClose">&times;</span>
                    <img id="lightboxImg" src="" alt="">
                </div>
            </div>
        </section>

        <!-- ======== 留言板页面 ======== -->
        <section class="page-section" id="page-messages">
            <div class="page-inner">
                <div class="section-header">
                    <h2 class="section-title">留言板</h2>
                    <div class="section-line"></div>
                    <p class="section-sub">留下你的足迹，让这里更温暖</p>
                </div>
                <div class="messages-layout">
                    <form class="message-form" id="messageForm">
                        <input type="text" id="msgName" placeholder="你的昵称" maxlength="30" required>
                        <textarea id="msgContent" placeholder="写下你想说的话..." rows="4" maxlength="500" required></textarea>
                        <button type="submit" class="hero-btn hero-btn-primary">发布留言</button>
                    </form>
                    <div class="message-list" id="messageList">
                        <div style="text-align:center;color:rgba(200,200,220,0.4);padding:2rem;">加载中...</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ======== 关于页 ======== -->
        <section class="page-section" id="page-about">
            <div class="page-inner">
                <!-- 基本信息 -->
                <div class="about-full">
                    <div class="about-avatar-large" id="aboutAvatarLarge">
                        <span id="aboutAvatarInitial">A</span>
                    </div>
                    <div class="about-detail">
                        <h2 id="aboutNameLarge">你的姓名</h2>
                        <p class="about-role" id="aboutTitleLarge">你的职位/头衔</p>
                        <p class="about-bio" id="aboutBioLarge">在这里写一段个人简介...</p>
                        <div class="about-interests" id="aboutInterests"></div>
                    </div>
                </div>

                <!-- 数据统计 -->
                <div class="about-stats" id="aboutStats"></div>

                <!-- 技能 + 经历 两栏 -->
                <div class="about-columns">
                    <div class="about-col">
                        <h3 class="about-col-title">技能</h3>
                        <div class="skills-list" id="skillsList"></div>
                    </div>
                    <div class="about-col">
                        <h3 class="about-col-title">经历</h3>
                        <div class="timeline" id="timeline"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- 音乐控制区域 -->
    <div class="music-zone" id="musicZone">
        <div class="music-wheel" id="musicWheel">
            <div class="music-wheel-item" data-track="0">
                <span class="music-wheel-label">TAVOS - 涧</span>
            </div>
            <div class="music-wheel-item" data-track="1">
                <span class="music-wheel-label">Toby Fox - His Theme</span>
            </div>
        </div>
        <button class="music-btn" id="musicBtn">
            <svg class="music-icon-play" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <svg class="music-icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
            </svg>
        </button>
    </div>

    <!-- 弹球画布 -->
    <canvas id="ballCanvas"></canvas>

    <script src="/static/js/home.js?v=10"></script>
</body>
</html>
